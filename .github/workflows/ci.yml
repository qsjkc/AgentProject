name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONPATH: .
      DATABASE_URL: sqlite+aiosqlite:///./tests/.runtime/test.db
      CHROMA_PERSIST_DIR: ./tests/.runtime/chroma
      UPLOAD_DIR: ./tests/.runtime/uploads
      DOWNLOAD_DIR: ./tests/.runtime/downloads
      INITIAL_ADMIN_USERNAME: admin
      INITIAL_ADMIN_EMAIL: admin@example.com
      INITIAL_ADMIN_PASSWORD: ChangeThisPassword123!
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare runtime directories
        run: |
          mkdir -p tests/.runtime/chroma
          mkdir -p tests/.runtime/uploads
          mkdir -p tests/.runtime/downloads

      - name: Run focused backend tests
        run: pytest -q -p no:cacheprovider tests/test_main.py

  frontend-checks:
    name: Frontend Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm run test

      - name: Run lint
        run: npm run lint

      - name: Build web portal
        run: npm run build

  desktop-renderer-check:
    name: Desktop Renderer Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: desktop

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run desktop tests
        run: npm run test

      - name: Build renderer
        run: npm run build:renderer
