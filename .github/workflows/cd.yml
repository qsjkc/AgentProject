name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy
        required: false
        default: main

concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    name: Preflight
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      deploy_ref: ${{ steps.vars.outputs.deploy_ref }}
      app_dir: ${{ steps.vars.outputs.app_dir }}
      server_port: ${{ steps.vars.outputs.server_port }}
      docker_enabled: ${{ steps.vars.outputs.docker_enabled }}
      server_enabled: ${{ steps.vars.outputs.server_enabled }}

    steps:
      - name: Resolve deployment variables
        id: vars
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_REF: ${{ inputs.ref }}
          WORKFLOW_SHA: ${{ github.event.workflow_run.head_sha }}
          SERVER_APP_DIR_SECRET: ${{ secrets.SERVER_APP_DIR }}
          SERVER_PORT_SECRET: ${{ secrets.SERVER_PORT }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USERNAME: ${{ secrets.SERVER_USERNAME }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            DEPLOY_REF="${INPUT_REF:-main}"
          else
            DEPLOY_REF="$WORKFLOW_SHA"
          fi

          APP_DIR="${SERVER_APP_DIR_SECRET:-/root/PersonalSpace/AgentProject}"
          SERVER_PORT_RAW="${SERVER_PORT_SECRET:-22}"
          SERVER_PORT="$(printf '%s' "$SERVER_PORT_RAW" | tr -d '\r\n[:space:]')"
          SERVER_PORT="${SERVER_PORT#:}"
          SERVER_PORT="${SERVER_PORT:-22}"

          if [[ ! "$SERVER_PORT" =~ ^[0-9]+$ ]]; then
            echo "Invalid SERVER_PORT value: '$SERVER_PORT_RAW'" >&2
            exit 1
          fi

          if [[ -n "$DOCKER_USERNAME" && -n "$DOCKER_PASSWORD" ]]; then
            DOCKER_ENABLED=true
          else
            DOCKER_ENABLED=false
          fi

          if [[ -n "$SERVER_HOST" && -n "$SERVER_USERNAME" && ( -n "$SERVER_PASSWORD" || -n "$SERVER_SSH_KEY" ) ]]; then
            SERVER_ENABLED=true
          else
            SERVER_ENABLED=false
          fi

          echo "deploy_ref=$DEPLOY_REF" >> "$GITHUB_OUTPUT"
          echo "app_dir=$APP_DIR" >> "$GITHUB_OUTPUT"
          echo "server_port=$SERVER_PORT" >> "$GITHUB_OUTPUT"
          echo "docker_enabled=$DOCKER_ENABLED" >> "$GITHUB_OUTPUT"
          echo "server_enabled=$SERVER_ENABLED" >> "$GITHUB_OUTPUT"

  desktop-installer:
    name: Desktop Installer
    needs: preflight
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: windows-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: desktop

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.deploy_ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run build

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: agentproject-desktop-win
          path: desktop/dist/releases/DetachymAgentPet1.0.exe
          retention-days: 7

  docker-publish:
    name: Publish Docker Images
    needs: preflight
    if: needs.preflight.outputs.docker_enabled == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.deploy_ref }}

      - name: Resolve image metadata
        id: image-meta
        shell: bash
        run: |
          set -euo pipefail
          APP_VERSION="$(python -c "from pathlib import Path; import re; content = Path('backend/app/core/config.py').read_text(encoding='utf-8'); match = re.search(r'APP_VERSION:\\s*str\\s*=\\s*\"([^\"]+)\"', content); assert match, 'APP_VERSION not found'; print(match.group(1))")"
          SHORT_SHA="$(git rev-parse --short HEAD)"
          echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/agentproject-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/agentproject-backend:v${{ steps.image-meta.outputs.app_version }}
            ${{ secrets.DOCKER_USERNAME }}/agentproject-backend:sha-${{ steps.image-meta.outputs.short_sha }}

      - name: Build and push nginx image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deploy/Dockerfile.nginx
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/agentproject-nginx:latest
            ${{ secrets.DOCKER_USERNAME }}/agentproject-nginx:v${{ steps.image-meta.outputs.app_version }}
            ${{ secrets.DOCKER_USERNAME }}/agentproject-nginx:sha-${{ steps.image-meta.outputs.short_sha }}

      - name: Build and push agent-server image
        uses: docker/build-push-action@v6
        with:
          context: ./agent-server
          file: ./agent-server/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/agentproject-agent-server:latest
            ${{ secrets.DOCKER_USERNAME }}/agentproject-agent-server:v${{ steps.image-meta.outputs.app_version }}
            ${{ secrets.DOCKER_USERNAME }}/agentproject-agent-server:sha-${{ steps.image-meta.outputs.short_sha }}

  deploy-server:
    name: Deploy Server
    needs: preflight
    if: needs.preflight.outputs.server_enabled == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SERVER_HOST_RAW: ${{ secrets.SERVER_HOST }}
      SERVER_USERNAME_RAW: ${{ secrets.SERVER_USERNAME }}
      SERVER_APP_DIR_RAW: ${{ secrets.SERVER_APP_DIR }}
      SERVER_PORT_RAW: ${{ secrets.SERVER_PORT }}
      APP_ENV_FILE_SECRET: ${{ secrets.APP_ENV_FILE }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.deploy_ref }}

      - name: Set up SSH
        shell: bash
        env:
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s' "$SERVER_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -lf ~/.ssh/id_ed25519
          touch ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Resolve deploy target
        shell: bash
        run: |
          set -euo pipefail
          HOST_INPUT="$(printf '%s' "${SERVER_HOST_RAW:-}" | tr -d '\r\n[:space:]')"
          USERNAME="$(printf '%s' "${SERVER_USERNAME_RAW:-}" | tr -d '\r\n[:space:]')"
          APP_DIR="$(printf '%s' "${SERVER_APP_DIR_RAW:-}" | tr -d '\r')"
          APP_DIR="${APP_DIR:-/root/PersonalSpace/AgentProject}"
          PORT="$(printf '%s' "${SERVER_PORT_RAW:-22}" | tr -d '\r\n[:space:]')"
          PORT="${PORT#:}"
          PORT="${PORT:-22}"

          HOST_INPUT="${HOST_INPUT#ssh://}"
          HOST_INPUT="${HOST_INPUT#http://}"
          HOST_INPUT="${HOST_INPUT#https://}"
          HOST_INPUT="${HOST_INPUT%%/*}"
          HOST_INPUT="${HOST_INPUT##*@}"

          if [[ "$HOST_INPUT" =~ ^\[(.+)\]:(.+)$ ]]; then
            if [[ -z "${SERVER_PORT_RAW:-}" ]]; then
              PORT="${BASH_REMATCH[2]}"
            fi
            HOST="${BASH_REMATCH[1]}"
          elif [[ "$HOST_INPUT" =~ ^([^:]+):([0-9]+)$ ]]; then
            if [[ -z "${SERVER_PORT_RAW:-}" ]]; then
              PORT="${BASH_REMATCH[2]}"
            fi
            HOST="${BASH_REMATCH[1]}"
          else
            HOST="$HOST_INPUT"
          fi

          if [[ -z "$HOST" ]]; then
            echo "SERVER_HOST is empty" >&2
            exit 1
          fi
          if [[ -z "$USERNAME" ]]; then
            echo "SERVER_USERNAME is empty" >&2
            exit 1
          fi
          if [[ ! "$PORT" =~ ^[0-9]+$ ]]; then
            echo "Invalid SERVER_PORT: '${SERVER_PORT_RAW:-}'" >&2
            exit 1
          fi

          echo "DEPLOY_HOST=$HOST" >> "$GITHUB_ENV"
          echo "DEPLOY_USER=$USERNAME" >> "$GITHUB_ENV"
          echo "DEPLOY_PORT=$PORT" >> "$GITHUB_ENV"
          echo "DEPLOY_APP_DIR=$APP_DIR" >> "$GITHUB_ENV"

          cat > ~/.ssh/config <<EOF
          Host deploy-target
            HostName $HOST
            User $USERNAME
            Port $PORT
            IdentityFile ~/.ssh/id_ed25519
            IdentitiesOnly yes
            StrictHostKeyChecking accept-new
            BatchMode yes
            ConnectTimeout 30
            ServerAliveInterval 60
            ServerAliveCountMax 10
          EOF
          chmod 600 ~/.ssh/config

          printf 'Deploy target: %s@%s:%s%s\n' "$USERNAME" "$HOST" "$PORT" "$APP_DIR"

      - name: Prepare remote directories
        shell: bash
        run: |
          set -euo pipefail
          ssh deploy-target \
            "mkdir -p '$DEPLOY_APP_DIR' \
             && mkdir -p '$DEPLOY_APP_DIR/agent-server' \
             && mkdir -p '$DEPLOY_APP_DIR/data/downloads' \
             && mkdir -p '$DEPLOY_APP_DIR/data/postgres' \
             && mkdir -p '$DEPLOY_APP_DIR/data/uploads' \
             && mkdir -p '$DEPLOY_APP_DIR/data/chroma' \
             && mkdir -p '$DEPLOY_APP_DIR/logs'"

      - name: Upload runtime env file when provided
        if: env.APP_ENV_FILE_SECRET != ''
        shell: bash
        run: |
          set -euo pipefail
          tmp_env="$(mktemp)"
          printf '%s' "$APP_ENV_FILE_SECRET" > "$tmp_env"
          scp "$tmp_env" "deploy-target:$DEPLOY_APP_DIR/.env"
          rm -f "$tmp_env"

      - name: Upload application source
        shell: bash
        run: |
          set -euo pipefail
          tar \
            --exclude='frontend/node_modules' \
            --exclude='frontend/dist' \
            --exclude='frontend/.vite' \
            --exclude='backend/venv' \
            --exclude='backend/__pycache__' \
            --exclude='backend/**/*.pyc' \
            --exclude='agent-server/.venv' \
            --exclude='agent-server/.pytest_cache' \
            -czf app-source.tgz \
            agent-server backend deploy frontend docker-compose.yml .dockerignore
          scp \
            app-source.tgz \
            "deploy-target:$DEPLOY_APP_DIR/"
          ssh deploy-target \
            "cd '$DEPLOY_APP_DIR' \
             && rm -rf frontend/node_modules frontend/dist frontend/.vite backend/venv agent-server/.venv \
             && tar xzf app-source.tgz \
             && rm -f app-source.tgz"
          rm -f app-source.tgz

      - name: Deploy on server
        shell: bash
        run: |
          set -euo pipefail
          ssh deploy-target "cd '$DEPLOY_APP_DIR' && PUBLIC_DEPLOY_HOST='$DEPLOY_HOST' bash -s" <<'REMOTE_DEPLOY'
          set -euo pipefail

          if [ ! -f .env ]; then
            echo 'Missing .env' >&2
            exit 1
          fi

          read_env() {
            grep -m1 "^$1=" .env | cut -d= -f2- | tr -d '\r' || true
          }

          upsert_env() {
            key="$1"
            value="$2"
            tmp_env="$(mktemp)"
            if grep -q "^${key}=" .env; then
              awk -v key="$key" -v value="$value" '
                BEGIN { replaced = 0 }
                $0 ~ "^" key "=" {
                  print key "=" value
                  replaced = 1
                  next
                }
                { print }
                END {
                  if (!replaced) {
                    print key "=" value
                  }
                }
              ' .env > "$tmp_env"
            else
              cat .env > "$tmp_env"
              printf '%s=%s\n' "$key" "$value" >> "$tmp_env"
            fi
            mv "$tmp_env" .env
          }

          AGENT_API_KEY="$(read_env VOLC_AGENT_API_KEY)"
          BACKEND_INTERNAL_API_KEY="$(read_env BACKEND_INTERNAL_API_KEY)"
          if [ -z "$AGENT_API_KEY" ] || [ -z "$BACKEND_INTERNAL_API_KEY" ]; then
            echo 'Missing VOLC_AGENT_API_KEY or BACKEND_INTERNAL_API_KEY in .env' >&2
            exit 1
          fi

          PUBLIC_ORIGIN="$(read_env WEB_APP_URL)"
          case "$PUBLIC_ORIGIN" in
            ""|http://localhost*|https://localhost*|http://127.0.0.1*|https://127.0.0.1*|http://0.0.0.0*|https://0.0.0.0*)
              PUBLIC_ORIGIN="https://${PUBLIC_DEPLOY_HOST}"
              ;;
          esac
          case "$PUBLIC_ORIGIN" in
            http://*) PUBLIC_ORIGIN="https://${PUBLIC_ORIGIN#http://}" ;;
          esac
          PUBLIC_ORIGIN="${PUBLIC_ORIGIN%/}"

          AGENT_CHAT_URL="$(read_env VOLC_AGENT_CHAT_COMPLETIONS_URL)"
          case "$AGENT_CHAT_URL" in
            ""|http://localhost*|https://localhost*|http://127.0.0.1*|https://127.0.0.1*|http://0.0.0.0*|https://0.0.0.0*)
              AGENT_CHAT_URL="${PUBLIC_ORIGIN}/agent/v1/chat/completions"
              upsert_env VOLC_AGENT_CHAT_COMPLETIONS_URL "$AGENT_CHAT_URL"
              ;;
          esac
          case "$AGENT_CHAT_URL" in
            https://*/v1/chat/completions) ;;
            *)
              echo "VOLC_AGENT_CHAT_COMPLETIONS_URL must be a public HTTPS /v1/chat/completions URL" >&2
              exit 1
              ;;
          esac

          printf 'AGENT_API_KEY=%s\nAGENT_LOG_LEVEL=info\nAGENT_FIRST_CHUNK_TIMEOUT_MS=8000\nAGENT_TOTAL_TIMEOUT_MS=45000\nAGENT_TOOL_TIMEOUT_MS=5000\nBACKEND_BASE_URL=http://agentproject-backend:5000\nBACKEND_INTERNAL_API_KEY=%s\n' "$AGENT_API_KEY" "$BACKEND_INTERNAL_API_KEY" > agent-server/.env

          command -v docker >/dev/null
          export DOCKER_BUILDKIT=1 COMPOSE_PROGRESS=plain
          docker compose up -d --build --remove-orphans
          cd agent-server
          docker compose up -d --build --remove-orphans
          cd ..

          for attempt in 1 2 3 4 5 6; do
            if docker compose exec -T backend python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health/ready')"; then
              break
            fi
            if [ "$attempt" -eq 6 ]; then
              echo 'Post-deploy readiness checks failed' >&2
              exit 1
            fi
            sleep 5
          done

          for attempt in 1 2 3 4 5 6; do
            if curl -fsS http://127.0.0.1:8001/health >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 6 ]; then
              echo 'Agent-server readiness checks failed' >&2
              exit 1
            fi
            sleep 5
          done

          docker compose ps
          REMOTE_DEPLOY
